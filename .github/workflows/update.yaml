name: Update Daily Papers

on:
  schedule:
    - cron: '0 16 * * *' # 00:00 Beijing time daily
  workflow_dispatch: # manual trigger

concurrency:
  group: daily-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
    steps:
    - uses: actions/checkout@v4

    - name: Download latest papers.db from Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download database -p papers.db || echo "No existing database found or download failed, starting fresh."

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - run: pip install -r requirements.txt openai arxiv-to-prompt

    - run: python main.py fetch

    - run: python main.py screen
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    - run: python main.py summarize
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    - run: python main.py readme

    - name: Upload papers.db to Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release view database || gh release create database --title "Database" --notes "Database storage"
        gh release upload database papers.db --clobber

    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'daily papers update'
        file_pattern: 'README.md'
        add_options: '--force'
        commit_user_name: 'DailyArXiv Bot'
        commit_user_email: 'bot@dailyarxiv.local'
